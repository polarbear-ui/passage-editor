<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지문 발췌기</title>

<!-- 웹폰트: 본문용 (고딕=Pretendard, 명조=Nanum Myeongjo) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">

<!-- DOM -> PNG 변환: html2canvas(기본, 화면과 동일한 줄바꿈 보장) + html-to-image(폴백) -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>

<style>
  :root{
    --bg:#ffffff;            /* 사이드바 배경 */
    --panel:#f5f7f9;         /* 섹션 표면 */
    --panel-2:#eef2f5;       /* 세그먼트 등 */
    --line:#dde4ea;          /* 경계선 */
    --accent:#74a5c2;        /* 포인트 (채도 낮은 하늘색) */
    --accent-strong:#517f9d; /* 진한 포인트 (글자/hover) */
    --accent-weak:#e7f0f5;   /* 옅은 틴트 */
    --txt:#2b3138;           /* 기본 글자 */
    --muted:#6a7480;         /* 흐린 글자 */
    --danger:#d9695c;
    --paper:#e8ebef;         /* 작업 영역 배경 */
    --radius:10px;
    --canvas-radius:14px;    /* 캔버스(저장 이미지) 모서리 둥글기 */
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:'Pretendard','Pretendard Variable',system-ui,sans-serif;
    color:var(--txt);
    background:var(--paper);
    overflow:hidden;
  }
  button{ font-family:inherit; }

  .app{ display:flex; height:100vh; width:100%; }

  /* ---------------- 사이드바 ---------------- */
  .sidebar{
    width:342px; flex:0 0 342px;
    background:var(--bg);
    border-right:1px solid var(--line);
    height:100vh; overflow-y:auto;
    padding:20px 18px 60px;
  }
  .brand{
    display:flex; align-items:center; gap:11px;
    padding-bottom:15px; margin-bottom:17px;
    border-bottom:1px solid var(--line);
  }
  .brand .mark{
    width:30px; height:30px; border-radius:9px;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    color:#ffffff; flex:0 0 auto;
  }
  .brand .mark svg{ width:17px; height:17px; }
  .brand h1{ font-size:16px; margin:0; letter-spacing:-0.2px; }

  .group{ margin-bottom:14px; }
  .group > .glabel{
    font-size:11px; font-weight:700; letter-spacing:0.5px;
    color:var(--accent-strong); text-transform:uppercase; margin:0 0 8px 2px;
  }
  .field{ margin-bottom:11px; }
  .field:last-child{ margin-bottom:0; }
  .field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .row{ display:flex; gap:8px; align-items:center; }
  .row.wrap{ flex-wrap:wrap; }

  select, input[type="text"]{
    width:100%; background:#fff; color:var(--txt);
    border:1px solid var(--line); border-radius:8px;
    padding:8px 10px; font-size:13px; outline:none;
  }
  select:focus, input:focus{ border-color:var(--accent); }

  input[type="range"]{
    -webkit-appearance:none; appearance:none; width:100%; height:4px;
    background:var(--line); border-radius:4px; outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--accent); cursor:pointer; border:2px solid #fff; box-shadow:0 0 0 1px var(--line);
  }
  input[type="range"]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%; background:var(--accent);
    cursor:pointer; border:2px solid #fff;
  }

  input[type="color"]{
    -webkit-appearance:none; appearance:none;
    width:38px; height:34px; padding:0; border:1px solid var(--line);
    border-radius:8px; background:#fff; cursor:pointer; flex:0 0 auto;
  }
  input[type="color"]::-webkit-color-swatch-wrapper{ padding:3px; }
  input[type="color"]::-webkit-color-swatch{ border:none; border-radius:5px; }

  .btn{
    background:#fff; color:var(--txt);
    border:1px solid var(--line); border-radius:8px;
    padding:8px 12px; font-size:12.5px; font-weight:600;
    cursor:pointer; transition:.12s; white-space:nowrap;
  }
  .btn:hover{ border-color:var(--accent); color:var(--accent-strong); }
  .btn:active{ transform:translateY(1px); }
  .btn.wide{ width:100%; display:block; text-align:center; }
  .btn.accent{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn.accent:hover{ background:var(--accent-strong); color:#fff; border-color:var(--accent-strong); }
  .btn.ghost-danger{ color:var(--danger); border-color:transparent; background:transparent; }
  .btn.ghost-danger:hover{ background:rgba(217,105,92,.10); border-color:var(--danger); color:var(--danger); }
  .btn.sm{ padding:6px 10px; font-size:12px; }
  .btn.tiny{ padding:5px 8px; font-size:11.5px; }
  .btn.active{ background:var(--accent); color:#fff; border-color:var(--accent); }

  .fmt-row{ display:flex; gap:6px; }
  .fmt-row .btn{ flex:1; text-align:center; }
  .fmt-b{ font-weight:800; }
  .fmt-i{ font-style:italic; }
  .fmt-s{ text-decoration:line-through; }

  .valtag{ font-size:12px; color:var(--accent-strong); font-variant-numeric:tabular-nums; min-width:44px; text-align:right; }

  /* 색상 히스토리 */
  .swatches{ display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .swatches:empty{ display:none; }
  .swatch{
    width:20px; height:20px; border-radius:5px; padding:0; cursor:pointer;
    border:1px solid rgba(0,0,0,.15); transition:transform .1s;
  }
  .swatch:hover{ transform:scale(1.12); }
  .swatch-clear{
    height:20px; padding:0 7px; border-radius:5px; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--muted);
    font-size:10.5px; font-weight:600; font-family:inherit; line-height:1;
  }
  .swatch-clear:hover{ color:var(--danger); border-color:var(--danger); }

  /* 접이식 섹션 */
  .collapse{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; background:var(--panel); }
  .collapse > .head{
    width:100%; text-align:left; background:transparent; border:none; color:var(--txt);
    padding:13px 14px; font-size:13.5px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .collapse > .head:hover{ color:var(--accent-strong); }
  .collapse > .head .chev{ transition:.2s; color:var(--muted); font-size:12px; }
  .collapse.open > .head .chev{ transform:rotate(180deg); }
  .collapse > .body{ display:none; padding:4px 14px 16px; border-top:1px solid var(--line); }
  .collapse.open > .body{ display:block; }

  .subcard{ background:#fff; border:1px solid var(--line); border-radius:9px; padding:12px; margin-top:10px; }
  .subcard h4{ margin:0 0 10px; font-size:12.5px; color:var(--accent-strong); display:flex; align-items:center; gap:8px; }
  .seg{ display:flex; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:3px; gap:3px; }
  .seg .btn{ flex:1; border:none; background:transparent; text-align:center; }
  .seg .btn.active{ background:var(--accent); color:#fff; }

  .hint{ font-size:11px; color:var(--muted); line-height:1.5; margin-top:6px; }

  .file-btn{ position:relative; overflow:hidden; }
  .file-btn input[type="file"]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }

  /* 저장/초기화 묶음: 다른 항목들과 같은 흐름에 자연스럽게 쌓이도록 둔다.
     (position:sticky로 고정하면 배경이 없어 뒤 내용과 겹쳐 보인다) */
  .actions{
    margin-top:18px; padding-top:16px;
    border-top:1px solid var(--line);
  }

  /* ---------------- 작업 영역 ---------------- */
  .workspace{
    flex:1; height:100vh; overflow:auto;
    display:flex; justify-content:center; align-items:flex-start;
    padding:34px 32px 80px;
  }
  .canvas-wrap{ position:relative; }

  .canvas{
    position:relative;
    width:600px;
    min-height:440px;
    transform-origin:top left;
    border-radius:var(--canvas-radius);
    box-shadow:0 14px 44px rgba(0,0,0,.16), 0 2px 8px rgba(0,0,0,.08);
    overflow:hidden;
    background:transparent;
    user-select:none;
  }
  .bg-layer{ position:absolute; inset:0; z-index:1; background:#ffffff; border-radius:inherit; }
  .overlay-layer{ position:absolute; inset:0; z-index:2; pointer-events:none; background:transparent; border-radius:inherit; }

  .body-text{
    position:relative; z-index:5;
    padding:44px 42px;
    min-height:240px;
    background:transparent;
    color:#222222;
    font-size:18px; line-height:1.6;
    font-family:'Pretendard','Pretendard Variable',sans-serif;
    outline:none; white-space:pre-wrap; word-break:break-word;
    caret-color:var(--accent);
  }
  .body-text.is-empty:before{
    content:attr(data-ph); color:currentColor; opacity:.4; pointer-events:none;
  }
  /* 붙여넣은 내용이 원문의 글자 크기·서체·줄간격을 들고 오면 슬라이더가 먹히지 않는다.
     편집 영역 안에서는 항상 상자(컨테이너) 설정을 따르도록 강제한다. 색/형광펜은 그대로 유지. */
  .body-text *, .ts-text *, .th-text *{
    font-size:inherit !important;
    font-family:inherit !important;
    line-height:inherit !important;
  }
  /* 붙여넣기로 들어온 문단의 기본 여백 제거 (문단 사이가 과하게 벌어지는 것 방지) */
  .body-text p, .body-text div,
  .ts-text p, .ts-text div,
  .th-text p, .th-text div{ margin:0; padding:0; }

  /* 스티커 공통 */
  .sticker{ position:absolute; touch-action:none; }
  .sticker .handle,
  .sticker .rotate-handle,
  .sticker .del-btn,
  .sticker .style-btn,
  .sticker .move-grip,
  .sticker .op-wrap{ opacity:0; transition:opacity .12s; pointer-events:none; }
  .sticker:hover .handle,
  .sticker:hover .rotate-handle,
  .sticker:hover .del-btn,
  .sticker:hover .style-btn,
  .sticker:hover .move-grip,
  .sticker:hover .op-wrap,
  .sticker.sel .handle,
  .sticker.sel .rotate-handle,
  .sticker.sel .del-btn,
  .sticker.sel .style-btn,
  .sticker.sel .move-grip,
  .sticker.sel .op-wrap{ opacity:1; pointer-events:auto; }

  .handle{
    position:absolute; width:13px; height:13px; border-radius:50%;
    background:#3d7bf2; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.4);
    touch-action:none; z-index:3;
  }
  .handle.tl{ left:-7px; top:-7px; cursor:nwse-resize; }
  .handle.tr{ right:-7px; top:-7px; cursor:nesw-resize; }
  .handle.bl{ left:-7px; bottom:-7px; cursor:nesw-resize; }
  .handle.br{ right:-7px; bottom:-7px; cursor:nwse-resize; }
  .handle.side{ background:#f2953d; top:50%; right:-7px; transform:translateY(-50%); cursor:ew-resize; }
  .rotate-handle{
    position:absolute; width:14px; height:14px; border-radius:50%;
    background:#2fbf71; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.4);
    left:50%; top:-30px; transform:translateX(-50%); cursor:grab; touch-action:none; z-index:3;
  }
  .rotate-handle:before{
    content:''; position:absolute; left:50%; top:14px; width:1px; height:16px;
    background:rgba(120,120,120,.6); transform:translateX(-50%);
  }
  .del-btn{
    position:absolute; right:-11px; top:-11px; width:20px; height:20px; border-radius:50%;
    background:var(--danger); color:#fff; border:2px solid #fff; cursor:pointer;
    font-size:12px; line-height:1; display:flex; align-items:center; justify-content:center;
    z-index:4; padding:0;
  }

  /* 이미지 스티커 */
  .img-sticker{ z-index:20; }
  .img-sticker:hover, .img-sticker.sel{ outline:1px dashed rgba(61,123,242,.7); outline-offset:2px; }
  .img-sticker img{ display:block; width:100%; height:100%; -webkit-user-drag:none; user-select:none; touch-action:none; pointer-events:auto; }
  .img-sticker.below{ pointer-events:none; z-index:3; outline:none !important; }
  .op-wrap{
    position:absolute; left:50%; bottom:-40px; transform:translateX(-50%);
    background:rgba(20,22,28,.92); border-radius:20px; padding:6px 12px;
    display:flex; align-items:center; gap:8px; white-space:nowrap; z-index:5;
  }
  .op-wrap input[type="range"]{ width:96px; }
  .op-wrap span{ color:#fff; font-size:11px; font-variant-numeric:tabular-nums; min-width:32px; }

  /* 텍스트 스티커 */
  .text-sticker{ z-index:20; min-width:40px; }
  .text-sticker:hover, .text-sticker.sel{ outline:1px dashed rgba(61,123,242,.7); outline-offset:2px; }
  .text-sticker .ts-text{
    outline:none; padding:8px 12px; font-size:24px; line-height:1.4;
    color:#222; font-family:'Pretendard','Pretendard Variable',sans-serif;
    word-break:break-word; white-space:pre-wrap; min-height:1em;
  }
  .text-sticker[data-bg="0"] .ts-text{ background:transparent; }
  .text-sticker[data-bg="1"] .ts-text{ background:rgba(255,255,255,.82); color:#222; border-radius:8px; }
  .text-sticker[data-bg="2"] .ts-text{ background:rgba(20,22,28,.82); color:#fff; border-radius:8px; }
  .move-grip{
    position:absolute; left:-9px; top:-9px; width:20px; height:20px; border-radius:6px;
    background:#6b7280; border:2px solid #fff; cursor:move; color:#fff; z-index:4;
    display:flex; align-items:center; justify-content:center; font-size:11px; touch-action:none;
  }
  .style-btn{
    position:absolute; left:-11px; bottom:-11px; width:22px; height:22px; border-radius:50%;
    background:#7c5cff; border:2px solid #fff; cursor:pointer; color:#fff; z-index:4;
    font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center;
  }

  /* ============ 속마음 컨테이너 ============ */
  .thoughts{
    position:relative; z-index:9000;
    display:flex; flex-direction:column; gap:14px;
    padding:0 34px;
  }
  /* 속마음이 하나라도 켜졌을 때만 아래 여백을 준다 (꺼져 있으면 본문 여백만 남도록) */
  .thoughts.has-thought{ padding-bottom:38px; }
  .thought .th-text{ outline:none; word-break:break-word; }
  .thought .th-profile{
    width:44px; height:44px; border-radius:50%; flex:0 0 auto;
    background-color:rgba(235,238,241,.85);
    background-size:cover; background-position:center; background-repeat:no-repeat;
  }

  /* 팝업형 = 알약(pill) 알림 배너 */
  .thought.popup{
    align-self:center; width:90%; max-width:540px;
    display:flex; align-items:center; gap:12px;
    border-radius:999px; padding:8px 22px 8px 8px;
    box-shadow:0 4px 14px rgba(0,0,0,.12);
  }
  .thought.popup .th-profile{ width:38px; height:38px; }
  .thought.popup .th-main{ flex:1; min-width:0; }
  .thought.popup .th-text{ text-align:center; font-size:15px; font-weight:600; line-height:1.4; }

  /* 말풍선형 */
  .thought.bubble{ display:flex; align-items:flex-end; gap:9px; max-width:82%; }
  .thought.bubble[data-char="1"]{ align-self:flex-start; }
  .thought.bubble[data-char="2"]{ align-self:flex-end; flex-direction:row-reverse; }
  .thought.bubble .th-main{
    border-radius:20px; padding:11px 16px; box-shadow:0 4px 14px rgba(0,0,0,.12); min-width:0;
  }
  .thought.bubble[data-char="1"] .th-main{ border-bottom-left-radius:6px; }
  .thought.bubble[data-char="2"] .th-main{ border-bottom-right-radius:6px; text-align:right; }
  .thought.bubble .th-text{ font-size:15px; line-height:1.5; }

  /* 캡처 중: 모든 편집 UI 숨김 */
  .canvas.capturing{ box-shadow:none; }
  /* html2canvas는 box-shadow를 못 그리므로, 캡처 중에는 유사 그림자로 대체 */
  .canvas.capturing .thought.popup,
  .canvas.capturing .thought.bubble .th-main{ box-shadow:none; position:relative; }
  .canvas.capturing .thought.popup::before,
  .canvas.capturing .thought.bubble .th-main::before{
    content:''; position:absolute; inset:0; transform:translateY(2px);
    border-radius:inherit; background:rgba(0,0,0,.06); z-index:-1;
  }
  .canvas.capturing .thought.popup::after,
  .canvas.capturing .thought.bubble .th-main::after{
    content:''; position:absolute; inset:2px; transform:translateY(4px);
    border-radius:inherit; background:rgba(0,0,0,.07); z-index:-1;
  }
  .canvas.capturing .handle,
  .canvas.capturing .rotate-handle,
  .canvas.capturing .del-btn,
  .canvas.capturing .style-btn,
  .canvas.capturing .move-grip,
  .canvas.capturing .op-wrap{ display:none !important; }
  .canvas.capturing .sticker,
  .canvas.capturing .img-sticker{ outline:none !important; }
  .canvas.capturing .is-empty:before{ content:'' !important; }

  /* iOS 저장 안내 오버레이 */
  #saveOverlay{
    position:fixed; inset:0; z-index:100000;
    background:rgba(20,24,30,.7);
    display:flex; align-items:center; justify-content:center; padding:20px;
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
  }
  #saveOverlay .save-sheet{
    background:#fff; border-radius:16px; padding:20px; max-width:420px; width:100%;
    max-height:88vh; overflow:auto; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  #saveOverlay .save-title{ margin:0 0 6px; font-size:16px; font-weight:700; color:var(--txt); }
  #saveOverlay .save-sub{ margin:0 0 14px; font-size:12.5px; color:var(--muted); line-height:1.5; }
  #saveOverlay .save-imgwrap{ margin-bottom:16px; }
  #saveOverlay .save-imgwrap img{
    max-width:100%; height:auto; border-radius:8px; border:1px solid var(--line);
    -webkit-touch-callout:default;   /* iOS 길게 눌러 저장 허용 */
  }

  /* ---------------- 반응형 ---------------- */
  @media (max-width:860px){
    body{ overflow:auto; }
    .app{ flex-direction:column; height:auto; }
    .sidebar{ width:100%; flex:none; height:auto; max-height:none; border-right:none; border-bottom:1px solid var(--line); }
    .workspace{ height:auto; padding:24px 16px 60px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ============ 사이드바 ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/>
          <line x1="20" y1="4" x2="8.12" y2="15.88"/>
          <line x1="14.47" y1="14.48" x2="20" y2="20"/>
          <line x1="8.12" y1="8.12" x2="12" y2="12"/>
        </svg>
      </div>
      <h1>지문 발췌기</h1>
    </div>

    <!-- 상시 노출: 서체 / 크기 -->
    <div class="group">
      <p class="glabel">본문 서식</p>
      <div class="field">
        <label>기본 서체</label>
        <select id="fontFamily">
          <option value="pretendard">프리텐다드 (고딕)</option>
          <option value="myeongjo">나눔명조 (명조)</option>
        </select>
      </div>
      <div class="field">
        <label>기본 글자 크기</label>
        <div class="row">
          <input type="range" id="fontSize" min="12" max="32" value="18">
          <span class="valtag" id="fontSizeVal">18px</span>
        </div>
      </div>
      <div class="field">
        <label>행간 (줄 간격)</label>
        <div class="row">
          <input type="range" id="lineHeight" min="1.1" max="2.4" step="0.05" value="1.6">
          <span class="valtag" id="lineHeightVal">1.60</span>
        </div>
      </div>
      <div class="field">
        <label>선택 영역 서식</label>
        <div class="fmt-row">

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const canvas   = $('#canvas');
  const canvasWrap = $('#canvasWrap');
  const workspace  = $('#workspace');
  const bgLayer  = $('#bgLayer');
  const overlay  = $('#overlay');
  const bodyText = $('#bodyText');

  let scale = 1;
  let imagesBelow = true;   // 기본: 텍스트 아래
  let zCounter = 20;
  let isCapturing = false;  // 캡처 중 relayout이 transform을 되돌리는 사고 방지

  // ============================================================
  // 스케일 / 반응형 레이아웃
  // ============================================================
  function relayout(){
    if (isCapturing) return;   // 캡처 중(모바일 키보드 닫힘 등으로 resize가 와도) 캔버스를 건드리지 않는다
    const avail = workspace.clientWidth - 64;
    scale = Math.min(1, Math.max(0.2, avail / 600));
    canvas.style.transform = 'scale(' + scale + ')';
    const h = canvas.offsetHeight;
    canvasWrap.style.width  = (600 * scale) + 'px';
    canvasWrap.style.height = (h * scale) + 'px';
    // 배경 이미지는 캔버스 높이를 기준으로 크기/위치를 계산하므로 높이가 변하면 다시 그린다
    try { if (bg.mode === 'image') renderBg(); } catch(e){}
  }
  window.addEventListener('resize', relayout);
  if (window.ResizeObserver){ new ResizeObserver(() => relayout()).observe(canvas); }

  // ============================================================
  // 헬퍼
  // ============================================================
  function readFile(input, cb){
    const f = input.files && input.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => { cb(r.result); input.value = ''; };
    r.readAsDataURL(f);
  }
  function hexToRgba(hex, a){
    hex = String(hex).replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
    const n = parseInt(hex, 16);
    return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')';
  }

  // ============================================================
  // 본문 텍스트
  // ============================================================
  const FONTS = {
    pretendard: "'Pretendard','Pretendard Variable',sans-serif",
    myeongjo:   "'Nanum Myeongjo',serif"
  };
  let defaultTextColor = '#222222';

  function updateEmpty(){
    const empty = bodyText.textContent.trim() === '' && !bodyText.querySelector('img');
    bodyText.classList.toggle('is-empty', empty);
  }
  bodyText.addEventListener('input', updateEmpty);

  $('#fontFamily').addEventListener('change', e => {
    bodyText.style.fontFamily = FONTS[e.target.value] || FONTS.pretendard;
  });
  const fsSlider = $('#fontSize'), fsVal = $('#fontSizeVal');
  fsSlider.addEventListener('input', () => {
    bodyText.style.fontSize = fsSlider.value + 'px';
    fsVal.textContent = fsSlider.value + 'px';
  });
  const lhSlider = $('#lineHeight'), lhVal = $('#lineHeightVal');
  lhSlider.addEventListener('input', () => {
    bodyText.style.lineHeight = lhSlider.value;
    lhVal.textContent = Number(lhSlider.value).toFixed(2);
  });

  // ---- 선택 영역 저장/복원 ----
  let savedRange = null, savedEl = null;
  document.addEventListener('selectionchange', () => {
    const s = window.getSelection();
    if (!s.rangeCount) return;
    const r = s.getRangeAt(0);
    let node = r.commonAncestorContainer;
    node = node.nodeType === 3 ? node.parentElement : node;
    const editable = node && node.closest && node.closest('[contenteditable="true"]');
    if (editable && canvas.contains(editable)){ savedRange = r.cloneRange(); savedEl = editable; }
  });
  function focusRestore(){
    if (savedEl){
      savedEl.focus();
      if (savedRange){ const s = window.getSelection(); s.removeAllRanges(); s.addRange(savedRange); }
    }
  }
  try { document.execCommand('styleWithCSS', false, true); } catch(e){}
  function exec(cmd, val){
    focusRestore();
    try { document.execCommand('styleWithCSS', false, true); } catch(e){}
    document.execCommand(cmd, false, val === undefined ? null : val);
  }
  ['btnBold','btnItalic','btnStrike','btnFore','btnHilite','btnHiliteClear'].forEach(id => {
    $('#'+id).addEventListener('mousedown', e => e.preventDefault());
  });
  $('#btnBold').addEventListener('click', () => exec('bold'));
  $('#btnItalic').addEventListener('click', () => exec('italic'));
  $('#btnStrike').addEventListener('click', () => exec('strikeThrough'));

  // ---- 글자색 / 형광펜 + 히스토리 (localStorage 보존) ----
  const forePicker = $('#foreColor'), hilitePicker = $('#hiliteColor');
  const foreHistEl = $('#foreHist'), hiliteHistEl = $('#hiliteHist');
  const LS_KEY = 'jimun-extractor:color-history';

  // 저장소가 막힌 환경(미리보기·시크릿 모드 등)에서도 앱이 죽지 않게 감싼다
  function loadHist(){
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      const d = JSON.parse(raw);
      const clean = a => Array.isArray(a)
        ? a.filter(c => typeof c === 'string' && /^#[0-9a-f]{6}$/i.test(c)).slice(0, 8)
        : [];
      return { fore: clean(d.fore), hilite: clean(d.hilite) };
    } catch(e){ return null; }
  }
  function saveHist(){
    try { localStorage.setItem(LS_KEY, JSON.stringify({ fore: foreHist, hilite: hiliteHist })); }
    catch(e){ /* 저장 불가 환경: 이번 세션 동안만 유지 */ }
  }

  const loaded = loadHist();
  let foreHist   = loaded ? loaded.fore   : [];
  let hiliteHist = loaded ? loaded.hilite : [];

  function pushColor(arr, c){
    c = c.toLowerCase();
    const i = arr.indexOf(c); if (i >= 0) arr.splice(i, 1);
    arr.unshift(c); if (arr.length > 8) arr.length = 8;
  }
  function renderSwatches(arr, host, picker, applyFn){
    host.innerHTML = '';
    arr.forEach(c => {
      const b = document.createElement('button');
      b.className = 'swatch'; b.type = 'button';
      b.style.background = c; b.title = c;
      b.addEventListener('mousedown', e => e.preventDefault());
      b.addEventListener('click', () => { picker.value = c; applyFn(c); });
      host.appendChild(b);
    });
    if (arr.length){
      const clr = document.createElement('button');
      clr.className = 'swatch-clear'; clr.type = 'button';
      clr.textContent = '비우기'; clr.title = '저장된 색 모두 지우기';
      clr.addEventListener('mousedown', e => e.preventDefault());
      clr.addEventListener('click', () => {
        arr.length = 0; renderSwatches(arr, host, picker, applyFn); saveHist();
      });
      host.appendChild(clr);
    }
  }
  function applyFore(c){
    exec('foreColor', c);
    unmarkSelectionColors();   // 사용자가 칠한 색은 원문 색 취급에서 제외
    pushColor(foreHist, c);
    renderSwatches(foreHist, foreHistEl, forePicker, applyFore);
    saveHist();
  }
  function applyHilite(c){
    exec('hiliteColor', c);
    unmarkSelectionColors('bg');   // 사용자가 친 형광펜은 원문 취급에서 제외
    pushColor(hiliteHist, c);
    renderSwatches(hiliteHist, hiliteHistEl, hilitePicker, applyHilite);
    saveHist();
  }
  $('#btnFore').addEventListener('click', () => applyFore(forePicker.value));
  $('#btnHilite').addEventListener('click', () => applyHilite(hilitePicker.value));
  $('#btnHiliteClear').addEventListener('click', () => exec('hiliteColor', 'transparent'));

  // 저장된 히스토리를 시작 시 화면에 복원
  renderSwatches(foreHist, foreHistEl, forePicker, applyFore);
  renderSwatches(hiliteHist, hiliteHistEl, hilitePicker, applyHilite);

  // ============================================================
  // 붙여넣기 정리 (원문의 글자 크기·서체·줄간격은 벗기고, 굵게/기울임/색/형광펜은 유지)
  // ============================================================
  const KEEP_TAGS = { B:1, STRONG:1, I:1, EM:1, U:1, S:1, STRIKE:1, DEL:1,
                      SPAN:1, BR:1, P:1, DIV:1, FONT:1 };

  function sanitizePastedHTML(html){
    const box = document.createElement('div');
    box.innerHTML = html;

    // 통째로 버릴 것들
    box.querySelectorAll('script,style,link,meta,iframe,object,embed,svg,img,video,audio,table,input,button')
       .forEach(el => el.remove());

    // 남길 서식(색·형광펜)만 뽑아내고 나머지 속성/스타일은 전부 제거
    box.querySelectorAll('*').forEach(el => {
      let color = '', bg = '';
      try {
        color = (el.style && el.style.color) || el.getAttribute('color') || '';
        bg    = (el.style && el.style.backgroundColor) || '';
      } catch(e){}
      // 모든 속성 제거 (style, class, font-size, id, on* 이벤트 등 싹)
      for (let i = el.attributes.length - 1; i >= 0; i--){
        el.removeAttribute(el.attributes[i].name);
      }
      if (color){ el.style.color = color; el.classList.add('pasted-color'); }
      if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)'){
        el.style.backgroundColor = bg; el.classList.add('pasted-bg');
      }
    });

    // 허용하지 않는 태그는 껍데기만 벗기고 내용은 살린다 (h1, a, li, blockquote 등)
    let guard = 0;
    while (guard++ < 50){
      const bad = box.querySelector('*:not(' + Object.keys(KEEP_TAGS).join('):not(') + ')');
      if (!bad) break;
      const parent = bad.parentNode;
      while (bad.firstChild) parent.insertBefore(bad.firstChild, bad);
      parent.removeChild(bad);
    }
    return box.innerHTML;
  }

  // 캔버스 안의 모든 편집 영역(본문·텍스트 스티커·속마음)에 적용
  canvas.addEventListener('paste', e => {
    const target = e.target.closest && e.target.closest('[contenteditable="true"]');
    if (!target || !canvas.contains(target)) return;
    const cb = e.clipboardData || window.clipboardData;
    if (!cb) return;
    e.preventDefault();

    const html = cb.getData('text/html');
    if (html){
      document.execCommand('insertHTML', false, sanitizePastedHTML(html));
    } else {
      // 순수 텍스트: 줄바꿈은 pre-wrap이 살려준다
      document.execCommand('insertText', false, cb.getData('text/plain') || '');
    }
    if (ignorePasted) stripPastedColors();   // 무시 모드면 새로 붙인 내용도 바로 적용
    updateEmpty();
  });

  // ============================================================
  // 공용 드래그 (마우스 + 터치)
  // ============================================================
  function startDrag(e, onMove, onEnd){
    e.preventDefault(); e.stopPropagation();
    const target = e.currentTarget, id = e.pointerId;
    const sx = e.clientX, sy = e.clientY;
    try { target.setPointerCapture(id); } catch(err){}
    function move(ev){ onMove((ev.clientX - sx) / scale, (ev.clientY - sy) / scale, ev); }
    function up(){
      try { target.releasePointerCapture(id); } catch(err){}
      target.removeEventListener('pointermove', move);
      target.removeEventListener('pointerup', up);
      target.removeEventListener('pointercancel', up);
      if (onEnd) onEnd();
    }
    target.addEventListener('pointermove', move);
    target.addEventListener('pointerup', up);
    target.addEventListener('pointercancel', up);
  }
  function centerScreen(el){
    const r = el.getBoundingClientRect();
    return { x: r.left + r.width/2, y: r.top + r.height/2 };
  }
  function bringFront(el, obj){
    zCounter++; obj.z = zCounter;
    if (!(obj.isImg && imagesBelow)) el.style.zIndex = zCounter;
  }
  function selectOnly(el){
    document.querySelectorAll('.sticker.sel').forEach(s => { if (s !== el) s.classList.remove('sel'); });
    el.classList.add('sel');
  }

  // ============================================================
  // 이미지 스티커
  // ============================================================
  function addImageSticker(src){
    const img = new Image();
    img.onload = () => {
      const ratio = img.naturalWidth / img.naturalHeight;
      let w = 220, h = w / ratio;
      if (h > 260){ h = 260; w = h * ratio; }
      const obj = { isImg:true, left:(600-w)/2, top:120, width:w, height:h, rot:0, opacity:1, ratio:ratio, z:20 };
      const el = document.createElement('div');
      el.className = 'sticker img-sticker';
      el.innerHTML =
        '<img alt="" draggable="false">' +
        '<span class="handle tl"></span><span class="handle tr"></span>' +
        '<span class="handle bl"></span><span class="handle br"></span>' +
        '<span class="rotate-handle"></span>' +
        '<button class="del-btn" type="button">✕</button>' +
        '<div class="op-wrap"><input type="range" min="10" max="100" value="100"><span>100%</span></div>';
      const imgEl = el.querySelector('img');
      imgEl.src = src; el._obj = obj;
      canvas.appendChild(el);
      renderImg(el);

      imgEl.addEventListener('pointerdown', e => {
        if (imagesBelow) return;
        selectOnly(el); bringFront(el, obj);
        const sl = obj.left, st = obj.top;
        startDrag(e, (dx,dy) => { obj.left = sl+dx; obj.top = st+dy; renderImg(el); });
      });
      el.querySelectorAll('.handle').forEach(hd => {
        hd.addEventListener('pointerdown', e => {
          if (imagesBelow) return;
          selectOnly(el); bringFront(el, obj);
          const c = centerScreen(el);
          const cxCanvas = obj.left + obj.width/2, cyCanvas = obj.top + obj.height/2;
          const startDist = Math.hypot(e.clientX-c.x, e.clientY-c.y) || 1;
          const sw = obj.width;
          startDrag(e, (dx,dy,ev) => {
            const d = Math.hypot(ev.clientX-c.x, ev.clientY-c.y);
            let nw = Math.max(30, Math.min(1400, sw * (d/startDist)));
            obj.width = nw; obj.height = nw / obj.ratio;
            obj.left = cxCanvas - obj.width/2; obj.top = cyCanvas - obj.height/2;
            renderImg(el);
          });
        });
      });
      el.querySelector('.rotate-handle').addEventListener('pointerdown', e => {
        if (imagesBelow) return;
        selectOnly(el); bringFront(el, obj);
        const c = centerScreen(el);
        const startAng = Math.atan2(e.clientY-c.y, e.clientX-c.x) * 180/Math.PI;
        const sr = obj.rot;
        startDrag(e, (dx,dy,ev) => {
          const a = Math.atan2(ev.clientY-c.y, ev.clientX-c.x) * 180/Math.PI;
          obj.rot = sr + (a - startAng); renderImg(el);
        });
      });
      const opRange = el.querySelector('.op-wrap input');
      const opSpan  = el.querySelector('.op-wrap span');
      opRange.addEventListener('input', () => {
        obj.opacity = opRange.value/100; opSpan.textContent = opRange.value + '%';
        imgEl.style.opacity = obj.opacity;
      });
      el.querySelector('.del-btn').addEventListener('click', () => el.remove());

      applyLayerState(el);
      setImagesBelow(false);
      selectOnly(el);
    };
    img.src = src;
  }
  function renderImg(el){
    const o = el._obj;
    el.style.left = o.left+'px'; el.style.top = o.top+'px';
    el.style.width = o.width+'px'; el.style.height = o.height+'px';
    el.style.transform = 'rotate('+o.rot+'deg)';
    el.querySelector('img').style.opacity = o.opacity;
  }
  function applyLayerState(el){
    const o = el._obj;
    if (imagesBelow){ el.classList.add('below'); el.style.zIndex = 3; }
    else { el.classList.remove('below'); el.style.zIndex = o.z || 20; }
  }
  function setImagesBelow(v){
    imagesBelow = v;
    document.querySelectorAll('.img-sticker').forEach(applyLayerState);
    updateLayerBtn();
  }
  function updateLayerBtn(){
    $('#btnToggleLayer').textContent = imagesBelow
      ? '텍스트 위로 올리기 (편집하려면 클릭)'
      : '텍스트 아래로 내리기';
  }
  $('#btnToggleLayer').addEventListener('click', () => setImagesBelow(!imagesBelow));
  $('#imgUpload').addEventListener('change', e => readFile(e.target, addImageSticker));

  // ============================================================
  // 텍스트 스티커
  // ============================================================
  function addTextSticker(){
    const obj = { left:200, top:160, width:220, rot:0, font:24, bg:0, z:20 };
    const el = document.createElement('div');
    el.className = 'sticker text-sticker'; el.dataset.bg = '0';
    el.innerHTML =
      '<div class="ts-text" contenteditable="true">텍스트를 입력하세요</div>' +
      '<span class="move-grip">✥</span>' +
      '<span class="handle br"></span>' +
      '<span class="handle side"></span>' +
      '<span class="rotate-handle"></span>' +
      '<button class="style-btn" type="button">A</button>' +
      '<button class="del-btn" type="button">✕</button>';
    el._obj = obj;
    canvas.appendChild(el);
    renderText(el);

    const textEl = el.querySelector('.ts-text');
    textEl.addEventListener('pointerdown', () => { selectOnly(el); bringFront(el, obj); });

    el.querySelector('.move-grip').addEventListener('pointerdown', e => {
      selectOnly(el); bringFront(el, obj);
      const sl = obj.left, st = obj.top;
      startDrag(e, (dx,dy) => { obj.left = sl+dx; obj.top = st+dy; renderText(el); });
    });
    el.querySelector('.handle.br').addEventListener('pointerdown', e => {
      selectOnly(el); bringFront(el, obj);
      const c = centerScreen(el);
      const startDist = Math.hypot(e.clientX-c.x, e.clientY-c.y) || 1;
      const sf = obj.font, swd = obj.width;
      startDrag(e, (dx,dy,ev) => {
        const d = Math.hypot(ev.clientX-c.x, ev.clientY-c.y);
        const s = Math.max(0.2, d/startDist);
        obj.font = Math.max(10, Math.min(160, sf*s));
        obj.width = Math.max(40, swd*s);
        renderText(el);
      });
    });
    el.querySelector('.handle.side').addEventListener('pointerdown', e => {
      selectOnly(el); bringFront(el, obj);
      const sw = obj.width;
      const rad = obj.rot * Math.PI/180, cos = Math.cos(rad), sin = Math.sin(rad);
      startDrag(e, (dx,dy) => {
        const localDx = dx*cos + dy*sin;
        obj.width = Math.max(40, sw + localDx); renderText(el);
      });
    });
    el.querySelector('.rotate-handle').addEventListener('pointerdown', e => {
      selectOnly(el); bringFront(el, obj);
      const c = centerScreen(el);
      const startAng = Math.atan2(e.clientY-c.y, e.clientX-c.x) * 180/Math.PI;
      const sr = obj.rot;
      startDrag(e, (dx,dy,ev) => {
        const a = Math.atan2(ev.clientY-c.y, ev.clientX-c.x) * 180/Math.PI;
        obj.rot = sr + (a - startAng); renderText(el);
      });
    });
    el.querySelector('.style-btn').addEventListener('click', () => {
      obj.bg = (obj.bg + 1) % 3; el.dataset.bg = String(obj.bg);
    });
    el.querySelector('.del-btn').addEventListener('click', () => el.remove());

    selectOnly(el);
    setTimeout(() => { textEl.focus(); document.execCommand('selectAll', false, null); }, 0);
  }
  function renderText(el){
    const o = el._obj;
    el.style.left = o.left+'px'; el.style.top = o.top+'px';
    el.style.width = o.width+'px'; el.style.transform = 'rotate('+o.rot+'deg)';
    el.querySelector('.ts-text').style.fontSize = o.font+'px';
  }
  $('#btnAddText').addEventListener('click', addTextSticker);

  const thoughts = {

  function renderThought(n){

    $('#th'+n+'-bg').addEventListener('input', e => { thoughts[n].bg = e.target.value; renderThought(n); });
    const op = $('#th'+n+'-bgop'), opv = $('#th'+n+'-bgop-v');
    op.addEventListener('input', () => { thoughts[n].bgop = +op.value; opv.textContent = op.value+'%'; renderThought(n); });
    $('#th'+n+'-color').addEventListener('input', e => { thoughts[n].color = e.target.value; renderThought(n); });
    renderThought(n);
  });

  // ============================================================
  // 배경
  // ============================================================
  const bg = { mode:'solid', color:'#ffffff', gradS:'#a8c5d6', gradE:'#dbe6ec',
               image:null, bakedImage:null, natW:0, natH:0,
               x:0, y:0, zoom:100, blur:0, bright:0 };

  function renderBg(){
    if (bg.mode === 'image' && bg.image){
      const src = bg.bakedImage || bg.image;
      const cw = 600;
      const ch = canvas.offsetHeight || 440;
      bgLayer.style.background = 'transparent';
      bgLayer.style.backgroundImage  = 'url(' + src + ')';
      bgLayer.style.backgroundRepeat = 'no-repeat';
      if (bg.natW && bg.natH){
        // cover 기준 크기를 직접 계산한 뒤 확대율을 곱한다.
        // (calc()나 cover 키워드 대신 px로 확정해야 캡처에서도 동일하게 그려진다)
        const cover = Math.max(cw / bg.natW, ch / bg.natH);
        const bw = bg.natW * cover * (bg.zoom / 100);
        const bh = bg.natH * cover * (bg.zoom / 100);
        bgLayer.style.backgroundSize = bw + 'px ' + bh + 'px';
        bgLayer.style.backgroundPosition =
          ((cw - bw) / 2 + bg.x) + 'px ' + ((ch - bh) / 2 + bg.y) + 'px';
      } else {
        bgLayer.style.backgroundSize = 'cover';
        bgLayer.style.backgroundPosition = 'center';
      }
    } else {
      bgLayer.style.backgroundImage = 'none';
      if (bg.mode === 'gradient') bgLayer.style.background = 'linear-gradient(180deg,'+bg.gradS+','+bg.gradE+')';
      else                        bgLayer.style.background = bg.color;
    }
    const v = bg.bright;
    if (v < 0)      overlay.style.background = 'rgba(0,0,0,'   + Math.min(0.85, -v/100) + ')';
    else if (v > 0) overlay.style.background = 'rgba(255,255,255,' + Math.min(0.85, v/100) + ')';
    else            overlay.style.background = 'transparent';
  }

  // html2canvas는 CSS 블러(filter)를 그리지 못한다. 미리보기만 흐리고 저장본은 선명해지는
  // 사고를 막기 위해, 블러를 이미지 자체에 미리 구워 넣은 뒤 그 결과를 배경으로 쓴다.
  function bakeBackgroundBlur(){
    if (!bg.image){ bg.bakedImage = null; renderBg(); return; }
    if (!bg.blur){ bg.bakedImage = null; renderBg(); return; }
    const im = new Image();
    im.onload = () => {
      try {
        const c = document.createElement('canvas');
        c.width = im.naturalWidth; c.height = im.naturalHeight;
        const ctx = c.getContext('2d');
        // 화면 기준 블러 값을 이미지 원본 해상도로 환산
        const k = Math.max(0.2, im.naturalWidth / 600);
        const px = bg.blur * k;
        ctx.filter = 'blur(' + px + 'px)';
        // 가장자리가 투명하게 번지지 않도록 살짝 키워서 그린다
        const pad = px * 2;
        ctx.drawImage(im, -pad, -pad, c.width + pad*2, c.height + pad*2);
        bg.bakedImage = c.toDataURL('image/png');
      } catch(e){
        bg.bakedImage = null;   // 실패 시 원본 사용 (블러 없이)
      }
      renderBg();
    };
    im.onerror = () => { bg.bakedImage = null; renderBg(); };
    im.src = bg.image;
  }

  function setDefaultTextColor(c){ defaultTextColor = c; bodyText.style.color = c; }

  // 원문 색 무시 모드.
  // CSS로 억지로 덮어쓰면(!important) 사용자가 직접 칠하는 색까지 함께 눌려버린다.
  // 그래서 붙여넣은 색을 "잠시 떼어내 보관"하고, 끄면 되돌려주는 방식으로 처리한다.
  const ipc = $('#ignorePastedColor');
  let ignorePasted = false;

  function stripPastedColors(){
    bodyText.querySelectorAll('.pasted-color').forEach(el => {
      if (el.style.color){
        el.dataset.pastedColor = el.style.color;   // 원문 글자색 보관
        el.style.color = '';                        // 기본 글자색을 따라가게
      }
    });
    bodyText.querySelectorAll('.pasted-bg').forEach(el => {
      if (el.style.backgroundColor){
        el.dataset.pastedBg = el.style.backgroundColor;   // 원문 형광펜 보관
        el.style.backgroundColor = '';                     // 배경 제거
      }
    });
  }
  function restorePastedColors(){
    bodyText.querySelectorAll('[data-pasted-color]').forEach(el => {
      el.style.color = el.dataset.pastedColor;
      delete el.dataset.pastedColor;
    });
    bodyText.querySelectorAll('[data-pasted-bg]').forEach(el => {
      el.style.backgroundColor = el.dataset.pastedBg;
      delete el.dataset.pastedBg;
    });
  }
  function setIgnorePastedColor(on){
    ignorePasted = on;
    ipc.checked = on;
    if (on) stripPastedColors(); else restorePastedColors();
  }
  ipc.addEventListener('change', () => setIgnorePastedColor(ipc.checked));

  // 사용자가 직접 칠한 색은 더 이상 '원문 색'이 아니므로 표식을 뗀다.
  // (이렇게 해야 나중에 무시 모드를 껐을 때 원문 색이 사용자의 색을 덮어쓰지 않는다)
  function unmarkSelectionColors(kind){
    const sel = window.getSelection();
    if (!sel || !sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const sels = kind === 'bg'
      ? '.pasted-bg, [data-pasted-bg]'
      : '.pasted-color, [data-pasted-color]';
    bodyText.querySelectorAll(sels).forEach(el => {
      let hit = false;
      try { hit = range.intersectsNode(el); } catch(e){}
      if (!hit) return;
      if (kind === 'bg'){
        if (el.style.backgroundColor){           // 방금 형광펜이 칠해진 요소
          el.classList.remove('pasted-bg');
          delete el.dataset.pastedBg;
        }
      } else if (el.style.color){                // 방금 글자색이 칠해진 요소
        el.classList.remove('pasted-color');
        delete el.dataset.pastedColor;
      }
    });
  }

  $('#bgWhite').addEventListener('click', () => {
    bg.mode='solid'; bg.color='#ffffff'; setDefaultTextColor('#222222');
    setIgnorePastedColor(true); renderBg();
  });
  $('#bgDark').addEventListener('click',  () => {
    bg.mode='solid'; bg.color='#1e1f26'; setDefaultTextColor('#ffffff');
    setIgnorePastedColor(true); renderBg();
  });
  $('#btnGrad').addEventListener('click', () => { bg.mode='gradient'; bg.gradS=$('#gradStart').value; bg.gradE=$('#gradEnd').value; renderBg(); });
  $('#btnBgColor').addEventListener('click', () => { bg.mode='solid'; bg.color=$('#bgColor').value; renderBg(); });

  const bgCtrls = $('#bgImgCtrls');
  $('#bgImage').addEventListener('change', e => readFile(e.target, d => {
    const probe = new Image();
    probe.onload = () => {
      bg.mode='image'; bg.image=d; bg.natW=probe.naturalWidth; bg.natH=probe.naturalHeight;
      bgCtrls.style.display = '';
      bakeBackgroundBlur();   // 내부에서 renderBg 호출
    };
    probe.src = d;
  }));
  $('#bgImgRemove').addEventListener('click', () => {
    bg.mode='solid'; bg.image=null; bg.bakedImage=null; bg.natW=0; bg.natH=0;
    bg.x=0; bg.y=0; bg.zoom=100; bg.blur=0;
    $('#bgX').value=0; $('#bgXVal').textContent='0';
    $('#bgY').value=0; $('#bgYVal').textContent='0';
    $('#bgZoom').value=100; $('#bgZoomVal').textContent='100%';
    $('#bgBlur').value=0; $('#bgBlurVal').textContent='0';

  });

  const bgXs=$('#bgX'), bgYs=$('#bgY'), bgZs=$('#bgZoom'), bgBs=$('#bgBlur');
  bgXs.addEventListener('input', () => { bg.x = +bgXs.value; $('#bgXVal').textContent = bgXs.value; renderBg(); });
  bgYs.addEventListener('input', () => { bg.y = +bgYs.value; $('#bgYVal').textContent = bgYs.value; renderBg(); });
  bgZs.addEventListener('input', () => { bg.zoom = +bgZs.value; $('#bgZoomVal').textContent = bgZs.value+'%'; renderBg(); });
  let blurTimer = null;
  bgBs.addEventListener('input', () => {
    bg.blur = +bgBs.value; $('#bgBlurVal').textContent = bgBs.value;

  });

  const br = $('#brightness'), brv = $('#brightnessVal');
  br.addEventListener('input', () => { bg.bright = +br.value; brv.textContent = br.value; renderBg(); });

  // ============================================================
  // 접이식 섹션
  // ============================================================
  document.querySelectorAll('.collapse .head[data-toggle]').forEach(h => {
    h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
  });

  // ============================================================
  // 네이티브 드래그 차단
  // ============================================================
  ['dragstart','dragover','drop'].forEach(ev => canvas.addEventListener(ev, e => e.preventDefault()));
  canvas.addEventListener('pointerdown', e => {
    if (e.target === canvas || e.target === bodyText || e.target === bgLayer)
      document.querySelectorAll('.sticker.sel').forEach(s => s.classList.remove('sel'));
  });

  // ============================================================
  // 전체 초기화
  // ============================================================
  $('#btnReset').addEventListener('click', () => {
    if (!confirm('모든 내용을 처음 상태로 되돌릴까요? 되돌릴 수 없습니다.')) return;
    bodyText.innerHTML = '';

    // 글자 크기·행간은 사용자가 맞춰둔 설정이므로 초기화에서 건드리지 않는다
    $('#fontFamily').value = 'pretendard';

    // 색상 히스토리는 문서 내용이 아니라 저장된 팔레트이므로 초기화에서 유지한다
    updateEmpty();

    document.querySelectorAll('.sticker').forEach(s => s.remove());
    setImagesBelow(true);

    [1,2].forEach(n => {
      const t = thoughts[n];
      t.shown=false; t.type='popup'; t.profile=null;
      t.bg = n===1 ? '#2b2d33' : '#7d9cb5';
      t.bgop = n===1 ? 88 : 92; t.color='#ffffff';
      $('#th'+n+'-show').checked=false;
      $('#th'+n+'-bg').value=t.bg;
      $('#th'+n+'-bgop').value=t.bgop; $('#th'+n+'-bgop-v').textContent=t.bgop+'%';
      $('#th'+n+'-color').value='#ffffff';
      document.querySelectorAll('.seg[data-th="'+n+'"] .btn').forEach(x => x.classList.toggle('active', x.dataset.type==='popup'));
      setThoughtText(n, t.def);
      renderThought(n);
    });

    bg.mode='solid'; bg.color='#ffffff'; bg.image=null; bg.bakedImage=null; bg.bright=0;
    bg.natW=0; bg.natH=0; bg.x=0; bg.y=0; bg.zoom=100; bg.blur=0;
    bg.gradS='#a8c5d6'; bg.gradE='#dbe6ec';
    $('#bgColor').value='#ffffff'; $('#gradStart').value='#a8c5d6'; $('#gradEnd').value='#dbe6ec';
    $('#bgX').value=0; $('#bgXVal').textContent='0';
    $('#bgY').value=0; $('#bgYVal').textContent='0';
    $('#bgZoom').value=100; $('#bgZoomVal').textContent='100%';
    $('#bgBlur').value=0; $('#bgBlurVal').textContent='0';
    bgCtrls.style.display='none';
    setIgnorePastedColor(false);
    setRoundCorners(true);
    br.value=0; brv.textContent='0';
    setDefaultTextColor('#222222');
    renderBg();
    relayout();
  });

  // ============================================================
  // PNG 저장 (캡처 안정화)
  // ============================================================
  function nextFrames(n){
    return new Promise(res => { (function step(k){ if (k<=0) return res(); requestAnimationFrame(()=>step(k-1)); })(n); });
  }

  // 캡처본에서 웹폰트가 대체 글꼴로 떨어지면 글자 폭이 달라져 본문이 "다시 흐르고",
  // 절대 위치인 스티커가 글자 위로 겹친다. 그래서 (1) 실제 쓰는 굵기까지 강제 로드하고
  // (2) 폰트를 CSS로 뽑아 캡처본에 직접 심어 준다.
  async function ensureFontsLoaded(){
    const specs = [
      '400 18px Pretendard', '600 18px Pretendard', '700 18px Pretendard',
      '400 18px "Nanum Myeongjo"', '700 18px "Nanum Myeongjo"'
    ];
    await Promise.all(specs.map(s => {
      try { return document.fonts.load(s, '가힣ABC123'); } catch(e){ return null; }
    }));
    try { await document.fonts.ready; } catch(e){}
  }

  let fontEmbedCache = null;
  async function getFontCSS(){
    if (fontEmbedCache !== null) return fontEmbedCache;
    try { fontEmbedCache = await window.htmlToImage.getFontEmbedCSS(canvas); }
    catch(e){ fontEmbedCache = ''; }   // 실패해도 저장 자체는 계속 진행
    return fontEmbedCache;
  }

  // html2canvas는 여러 줄에 걸친 인라인 배경(형광펜)을 하나의 큰 사각형으로
  // 잘못 칠한다("벽돌" 현상). 캡처 직전에 형광펜을 줄 단위 사각형으로 분해해
  // 본문 아래(z=4)에 따로 그려 두고, 원본 배경은 잠시 투명 처리한다.
  function buildHighlightOverlays(){
    const created = [], modified = [];
    const base = canvas.getBoundingClientRect();   // transform:none 상태에서 호출할 것
    canvas.querySelectorAll('[contenteditable="true"] *').forEach(el => {
      const bg = el.style && el.style.backgroundColor;
      if (!bg || bg === 'transparent' || bg === 'rgba(0, 0, 0, 0)') return;
      const range = document.createRange();
      range.selectNodeContents(el);
      const rects = range.getClientRects();
      for (let i = 0; i < rects.length; i++){
        const r = rects[i];
        if (r.width < 0.5 || r.height < 0.5) continue;
        const d = document.createElement('div');
        d.className = 'hl-rect';
        d.style.cssText = 'position:absolute;pointer-events:none;z-index:4;background:' + bg +
          ';left:' + (r.left - base.left) + 'px;top:' + (r.top - base.top) +
          'px;width:' + r.width + 'px;height:' + r.height + 'px;';
        canvas.appendChild(d);
        created.push(d);
      }
      modified.push([el, bg]);
      el.style.backgroundColor = 'transparent';
    });
    return function cleanup(){
      created.forEach(d => d.remove());
      modified.forEach(p => { p[0].style.backgroundColor = p[1]; });
    };
  }

  async function saveImage(){
    const sel = window.getSelection(); if (sel) sel.removeAllRanges();
    if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
    document.querySelectorAll('.sticker.sel').forEach(s => s.classList.remove('sel'));

    const btn = $('#btnSave'); const label = btn.textContent;
    const prevTransform = canvas.style.transform;
    const prevWinY = window.scrollY || 0;
    const prevWsY  = workspace.scrollTop || 0;
    let cleanupHighlights = null;
    let dataUrl = null;

    isCapturing = true;                 // relayout 잠금 (키보드 닫힘 등 resize가 와도 transform 고정)
    canvas.classList.add('capturing');
    canvas.style.transform = 'none';
    // 스크롤된 상태로 캡처하면 위치가 밀릴 수 있어(모바일에서 특히) 잠시 맨 위로
    window.scrollTo(0, 0); workspace.scrollTop = 0;
    btn.textContent = '저장 준비 중…'; btn.disabled = true;

    try {
      await ensureFontsLoaded();
      await nextFrames(4);

      // 형광펜을 줄 단위 사각형으로 분해 (좌표는 transform:none 기준)
      cleanupHighlights = buildHighlightOverlays();

      const w = 600;
      // 저장 높이는 "캔버스 상자 자체"의 높이여야 한다.
      // scrollHeight를 쓰면 캔버스 밖으로 넘친 스티커까지 세어 높이가 부풀고,
      // 그 결과 캔버스 아래에 빈 공간이 붙은 PNG가 나온다. (실제 제보된 증상)
      // getBoundingClientRect는 소수점까지 주므로 마지막 줄 밑동도 깎이지 않는다.
      const rectH = canvas.getBoundingClientRect().height;   // 이 시점 transform:none
      const h = Math.max(1, Math.ceil(Math.min(rectH, canvas.offsetHeight + 1)));

      // 모바일(특히 iOS 사파리)은 캔버스 총 픽셀 수에 상한이 있어, 지문이 아주 길면
      // 2배 해상도 버퍼가 한계를 넘어 빈 이미지가 저장된다. 넘칠 때만 배율을 낮춘다.
      const MAX_AREA = IS_IOS ? 10000000 : 16000000;   // iOS는 더 보수적으로 (약 1,000만 px)
      let ratio = 2;
      if (w * h * ratio * ratio > MAX_AREA){
        ratio = Math.max(1, Math.sqrt(MAX_AREA / (w * h)));
      }

      // 복제본이 폰트를 네트워크에서 다시 받게 두면, 못 받았을 때 대체 글꼴로 조판되어
      // 줄 수가 늘고 아래가 잘린다. 폰트를 데이터로 심어 복제본에 직접 주입한다.
      const embedCSS = await getFontCSS();

      try {
        // 1차: html2canvas — 화면에 실제로 렌더된 글자 위치를 그대로 그리므로
        //       저장본의 줄바꿈이 미리보기와 항상 일치한다.
        const out = await window.html2canvas(canvas, {
          scale: ratio,
          width: w, height: h,
          backgroundColor: null,    // 둥근 모서리 밖은 투명
          useCORS: true,
          logging: false,
          imageTimeout: 0,          // 이미지 로딩을 시간 제한으로 끊지 않음
          onclone: function(doc){
            if (embedCSS){
              const st = doc.createElement('style');
              st.textContent = embedCSS;   // @font-face (데이터 URL) — 네트워크 의존 제거
              doc.head.appendChild(st);
            }
          }
        });
        dataUrl = out.toDataURL('image/png');
      } catch(err1){
        // 2차 폴백: html-to-image (줄바꿈이 어긋날 수 있으나 저장 자체는 가능)
        dataUrl = await window.htmlToImage.toPng(canvas, {
          width: w, height: h,
          canvasWidth: Math.round(w*ratio), canvasHeight: Math.round(h*ratio),
          backgroundColor: null,
          fontEmbedCSS: embedCSS,
          style: { transform:'none', margin:'0', left:'0', top:'0' }
        });
      }
    } catch(err){
      alert('이미지 저장 중 문제가 발생했어요.\n다시 시도해 주세요.\n(' + err + ')');
    } finally {
      // 어떤 경우에도(예외 포함) 편집기를 원래 상태로 되돌린다 — 잠긴 채 굳는 것 방지
      if (cleanupHighlights) cleanupHighlights();
      canvas.style.transform = prevTransform;
      canvas.classList.remove('capturing');
      btn.textContent = label; btn.disabled = false;
      isCapturing = false;
      relayout();
      window.scrollTo(0, prevWinY); workspace.scrollTop = prevWsY;
    }

    if (dataUrl){
      deliverImage(dataUrl);
    }
  }

  // iOS 사파리 감지 (아이패드 데스크톱 모드 포함)
  const IS_IOS = /iP(hone|od|ad)/.test(navigator.platform) ||
                 (navigator.userAgent.includes('Mac') && 'ontouchend' in document);

  // 저장 전달: 데스크톱/안드로이드는 자동 다운로드, iOS 사파리는 꾹 눌러 저장하도록 안내.
  function deliverImage(dataUrl){
    const filename = '지문발췌_' + Date.now() + '.png';

    // 1순위: download 속성이 실제로 지원되고 iOS가 아니면 자동 다운로드
    const a = document.createElement('a');
    const supportsDownload = ('download' in a) && !IS_IOS;
    if (supportsDownload){
      a.href = dataUrl; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove();
      return;
    }

    // iOS 등: 화면에 이미지를 띄우고 길게 눌러 저장하도록 오버레이 표시
    showSaveOverlay(dataUrl);
  }

  function showSaveOverlay(dataUrl){
    // 기존 오버레이 제거
    const old = document.getElementById('saveOverlay');
    if (old) old.remove();

    const ov = document.createElement('div');
    ov.id = 'saveOverlay';
    ov.innerHTML =
      '<div class="save-sheet">' +
        '<p class="save-title">이미지를 길게 눌러 저장하세요</p>' +
        '<p class="save-sub">사진을 꾹 눌러 “이미지 저장”을 선택하면 사진 앱에 담깁니다.</p>' +
        '<div class="save-imgwrap"><img alt="저장할 이미지"></div>' +
        '<button type="button" class="btn accent wide save-close">닫기</button>' +
      '</div>';
    ov.querySelector('img').src = dataUrl;
    ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
    ov.querySelector('.save-close').addEventListener('click', () => ov.remove());
    document.body.appendChild(ov);
  }

  $('#btnSave').addEventListener('click', saveImage);

  // 캔버스 모서리 둥글기 on/off
  // (끄면 캔버스 전체가 배경으로 채워져 투명 픽셀이 없어진다 → 트위터 등에서 흰 모서리 방지)
  const roundCb = $('#roundCorners');
  function setRoundCorners(on){
    roundCb.checked = on;
    canvas.style.borderRadius = on ? 'var(--canvas-radius)' : '0';
  }
  roundCb.addEventListener('change', () => setRoundCorners(roundCb.checked));

  // ============================================================
  // 초기 실행
  // ============================================================
  bodyText.style.fontFamily = FONTS.pretendard;
  bodyText.style.fontSize = '18px';
  bodyText.style.lineHeight = '1.6';
  setDefaultTextColor('#222222');
  ensureFontsLoaded();   // 시작하자마자 웹폰트를 확정 로드 (미리보기와 저장본의 글자 폭 일치)
  renderBg();
  updateLayerBtn();
  updateEmpty();
  relayout();
  window.addEventListener('load', relayout);
})();
</script>
</body>
